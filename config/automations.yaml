# ============================================================
# [TEST BUREAU LUC - MESSAGE VOCAL Meteo DEMAIN]
# ============================================================
# A 15:30, envoie un message vocal sur le Google Nest Hub de Bureau Luc.
- id: 'test_bureau_luc_diffuse_meteo'
  alias: ZZ Test | Bureau Luc | Message vocal Meteo demain
  description: A 15:30, diffuse la meteo de demain sur Bureau Luc Google Nest Hub.
  triggers:
  - trigger: time
    at: '15:30:00'
  conditions: []
  actions:
  - action: weather.get_forecasts
    target:
      entity_id: weather.forecast_maison
    data:
      type: daily
    response_variable: meteo_demain
  - action: tts.speak
    target:
      entity_id: tts.google_translate_fr_ca
    data:
      media_player_entity_id: media_player.luc
      message: >-
          {% set f = meteo_demain['weather.forecast_maison'].forecast[0] %}
          {% set condition_map = {
            'clear-night': 'ciel degage',
            'cloudy': 'nuageux',
            'exceptional': 'conditions exceptionnelles',
            'fog': 'brumeux',
            'hail': 'de la grele',
            'lightning': 'des orages',
            'lightning-rainy': 'des orages avec pluie',
            'partlycloudy': 'partiellement nuageux',
            'pouring': 'de fortes pluies',
            'rainy': 'pluvieux',
            'snowy': 'neigeux',
            'snowy-rainy': 'neige fondante',
            'sunny': 'ensoleille',
            'windy': 'venteux',
            'windy-variant': 'venteux avec eclaircies'
          } %}
          {% set cond = condition_map.get(f.condition, f.condition) %}
          {% set pluie = f.precipitation_probability | default(none) %}
          Demain: {{ cond }}, maximum {{ f.temperature | round(0) }} degres, minimum {{ f.templow | round(0) }} degres{% if pluie is not none %}, risque de pluie {{ pluie | round(0) }} pour cent{% endif %}.
  mode: single
# ============================================================
# [TEST BUREAU LUC - MESSAGE VOCAL Meteo DEMAIN GOOGLE-LIKE]
# ============================================================
# Test manuel: style plus conversationnel, facon assistant vocal.
- id: 'test_bureau_luc_diffuse_meteo_google_like'
  alias: ZZ Test | Bureau Luc | Message vocal Meteo demain Google-like
  description: Test manuel, diffuse la meteo de demain avec formulation conversationnelle.
  triggers: []
  conditions: []
  actions:
  - action: weather.get_forecasts
    target:
      entity_id: weather.forecast_maison
    data:
      type: daily
    response_variable: meteo_demain
  - action: tts.speak
    target:
      entity_id: tts.google_translate_fr_ca
    data:
      media_player_entity_id: media_player.luc
      message: >-
        {% set f = meteo_demain['weather.forecast_maison'].forecast[0] %}
        {% set condition_map = {
          'clear-night': 'ciel degage',
          'cloudy': 'nuageux',
          'exceptional': 'conditions exceptionnelles',
          'fog': 'brumeux',
          'hail': 'de la grele',
          'lightning': 'des orages',
          'lightning-rainy': 'des orages avec pluie',
          'partlycloudy': 'partiellement nuageux',
          'pouring': 'de fortes pluies',
          'rainy': 'de la pluie',
          'snowy': 'de la neige',
          'snowy-rainy': 'de la neige fondante',
          'sunny': 'du soleil',
          'windy': 'du vent',
          'windy-variant': 'un ciel variable et du vent'
        } %}
        {% set cond = condition_map.get(f.condition, f.condition) %}
        {% set tmax = f.temperature | round(0) %}
        {% set tmin = f.templow | round(0) %}
        {% set pluie = f.precipitation_probability | default(none) %}
        Voici la meteo de demain. On attend {{ cond }}, avec un maximum de {{ tmax }} degres et un minimum de {{ tmin }} degres.{% if pluie is not none %} Probabilite de pluie: {{ pluie | round(0) }} pour cent.{% endif %} Bonne soiree.
  mode: single

# ============================================================
# [BUREAU LUC - TRANSITION CONCENTRATION VERS DETENTE PUIS EXTINCTION]
# ============================================================
# Quand la scene Concentration de Bureau Luc est activee,
# attend 10 secondes, passe en Détente a 100%, puis diminue jusqu'a extinction en 1 minute.
- id: 'bureau_luc_concentration_to_detente_then_off'
  alias: Lumiere | Bureau Luc | Concentration 10s puis Detente 100% et extinction 1 min
  description: Sequence Bureau Luc - Concentration, puis Detente 100%, puis extinction progressive sur 1 minute.
  triggers:
  - trigger: state
    entity_id: scene.bureau_luc_concentration
  conditions: []
  actions:
  - delay: '00:00:10'
  - action: scene.turn_on
    target:
      entity_id: scene.bureau_luc_detente
  - action: light.turn_on
    target:
      entity_id: light.bureau_luc
    data:
      brightness_pct: 100
  - action: light.turn_off
    target:
      entity_id: light.bureau_luc
    data:
      transition: 20
  mode: restart

