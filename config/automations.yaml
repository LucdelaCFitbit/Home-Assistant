    at: '06:30:00'
    id: dawn_warm_low
  - trigger: time
    at: '07:00:00'
    id: dawn_warm_mid
  - trigger: time
    at: '07:30:00'
    id: off_730
  conditions:
  - condition: state
    entity_id: input_boolean.vacances
    state: 'off'
  - condition: time
    weekday:
