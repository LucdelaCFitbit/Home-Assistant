# ============================================================
# [POULAILLER - ON/OFF AVANT SOLEIL ET EXTINCTION PROGRESSIVE AU COUCHER]
# ============================================================
# Allume la lumiere du poulailler 30 minutes avant le coucher du soleil
# avec le scenario concentration, puis lance une extinction progressive
# de 30 minutes au coucher du soleil.
- id: 'poulailler_light_on_off_minus30_and_progressive_off_at_sunset'
  alias: Lumiere | ON/OFF Poulailler
  description: Allume la lumiere du poulailler a -30 min du coucher du soleil, puis extinction progressive de 30 min au coucher du soleil.
  triggers:
  - trigger: sun
    event: sunset
    offset: '-00:30:00'
    id: on_minus_30
  - trigger: sun
    event: sunset
    id: off_at_sunset
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: on_minus_30
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.poulailler_lumineux
    - conditions:
      - condition: trigger
        id: off_at_sunset
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.poulailler
        data:
          transition: 1800
  mode: single

# ============================================================
