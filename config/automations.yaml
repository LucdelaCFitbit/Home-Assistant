- id: 'test_lumiere_chambre_ami'
  alias: ZZ Test | Lumiere | chambre ami
  description: test chambre ami, execution manuelle.
  triggers: []
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.andre_mode
        state: 'off'
      - condition: state
        entity_id: input_boolean.guest_mode
        state: 'off'
      sequence:
      - action: script.transition_lights_kelvin_then_dim_to_pct
        data:
          area_list:
          - chambre_amis
          color_temp_kelvin: "{{ states('sensor.kelvin_stimulation') }}"
          kelvin_transition_seconds: 10
          end_brightness_pct: 0
          dim_transition_seconds: 10
  mode: single

- id: 'test_rezchausse_progressive_dim_if_mode_off'
  alias: ZZ Test | Lumiere | DIM Sallon, foyer, Salle a manger et cuisine | Passage progressif soir
  description: Copie de test sans declencheurs temporels/sun ni conditions saisonnieres; execution manuelle.
  triggers: []
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.andre_mode
        state: 'off'
      - condition: state
        entity_id: input_boolean.guest_mode
        state: 'off'
      - condition: state
        entity_id: remote.tv
        state: 'off'
      sequence:
      - action: script.transition_lights_kelvin_then_dim_to_pct
        data:
          area_list:
          - foyer
          - salle_a_manger
          - cuisine
          light_list:
          - light.salon_1
          - light.salon_2
          - light.salon_3
          - light.salon_4
          color_temp_kelvin: "{{ states('sensor.kelvin_detente') | int(2250) }}"
          kelvin_transition_seconds: 10
          end_brightness_pct: 0
          per_light_end_brightness_pct:
            light.salon_2: 30
            light.salon_3: 30
          dim_transition_seconds: 20
  mode: single