- id: 'test_bureau_luc_voice_1530'
  alias: Test | Bureau Luc | Message vocal 15h30
  description: A 15:30, diffuse Bonne fin de journée Luc sur Bureau Luc Google Nest Hub.
  triggers:
  - trigger: time
    at: '15:30:00'
  conditions: []
