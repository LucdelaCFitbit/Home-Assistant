    at: '06:30:00'
    id: on_0630
  - trigger: time
    at: '17:00:00'
    id: off_1700
  conditions:
  - condition: state
    entity_id: input_boolean.vacances
    state: 'off'
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: on_0630
      sequence:
      - action: scene.turn_on
        target:
