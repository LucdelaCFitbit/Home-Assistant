  description: Active le capteur de mouvement d'entree (lancement manuel).
  triggers: []
  conditions: []
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.motion_entre_capteur_de_mouvement
  mode: single
# ============================================================
# [TEST BUREAU LUC - MESSAGE VOCAL 15H30]
