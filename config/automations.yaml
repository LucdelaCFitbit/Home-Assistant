# ============================================================
# [FIN DE SEMAINE ET FERIES - LUMIERES SI PLUIE] Progression vers scenario stimulation a 50%
# ============================================================
# En fin de semaine ou jour ferie (via Workday), si la meteo est pluvieuse,
# allume salon + foyer a 50% avec la temperature de couleur Stimulation.
- id: 'weekend_rainy_turn_on_salon_foyer_stimulation'
  alias: Lumiere | Weekend/Ferie pluie | ON salon et foyer stimulation 50%
  description: En fin de semaine ou jour ferie, allume salon et foyer si la meteo est rainy.
  triggers:
  - trigger: state
    entity_id: weather.forecast_maison
    to: rainy
    id: rainy_state
  - trigger: time
    at: '08:30:00'
    id: day_type_check
  conditions:
  - condition: time
    weekday:
    - sat
    - sun
  - condition: time
    before: '12:00:00'
  - condition: template
    value_template: >-
      {{ now().weekday() in [5, 6] or is_state('binary_sensor.workday_sensor', 'off') }}
  - condition: state
    entity_id: weather.forecast_maison
    state: rainy
  actions:
  - action: light.turn_on
    target:
      area_id:
      - salon
      - foyer
    data:
      color_temp_kelvin: "{{ states('sensor.kelvin_stimulation') | int(6400) }}"
      brightness_pct: 50
      transition: 600
  mode: single

# ============================================================
# [NUIT - ETEINDRE TOUTES LES LUMIERES SAUF ADRESSE]
# ============================================================
# Entre 22:30 et 23:30 (heure aleatoire), eteint toutes les lumieres allumees sauf celles de la zone Adresse.
- id: 'night_random_turn_off_lights_except_adresse'
  alias: Lumiere | Nuit | Eteindre toutes les lumieres sauf Adresse
  description: Entre 22:30 et 23:30 (aleatoire), eteint toutes les lumieres allumees sauf la zone Adresse.
  triggers:
  - trigger: time
    at: '22:30:00'
  conditions: []
  actions:
  - delay:
      seconds: "{{ range(0, 3601) | random }}"
  - action: script.night_shutdown_except_adresse
  mode: single

# ============================================================
