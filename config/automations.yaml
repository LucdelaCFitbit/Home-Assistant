# ============================================================
# AUTOMATIONS HOME ASSISTANT
# ============================================================
# Convention:
# - Chaque bloc correspond a un usage (protection, fermeture, ouverture)
# - Les IDs restent stables pour ne pas casser les references HA
# - Les conditions andre_mode protegent uniquement les stores salon/salle a manger
# ============================================================
# [SECTION AVEC ANDRE_MODE OU INVITE_MODE ACTIF, ON NE FERME PAS LES STORES SALON/SALLE A MANGER]
# DEBUT SECTION
# ============================================================
# ============================================================
# [FERMETURE EN FIN DE JOURNEE]
# ============================================================
# Au coucher du soleil, ferme salon + salle a manger, puis répète après 1 et 2 minutes
# uniquement si andre_mode ou guest_mode est OFF.
- id: 'sunset_close_salon_dining_covers'
  alias: Store | Soleil | Fermer stores salon et salle a manger
  description: Ferme les stores au coucher du soleil. 3 essais espacés de 1 minute, sauf si andre_mode ou guest_mode est actif.
  triggers:
  - trigger: sun
    event: sunset
  conditions:
  - condition: state
    entity_id: input_boolean.andre_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  actions:
  - repeat:
      count: 3
      sequence:
      - action: cover.close_cover
        target:
          entity_id:
          - cover.salon
          - cover.porte_patio
      - if: "{{ not repeat.last }}"
        then:
        - delay: '00:01:00'
  mode: single
# ============================================================
# [OUVERTURE SAISONNIERE DES STORES]
# ============================================================
# Hiver (nov-fev): ouverture au lever du soleil avec répétitions après 1 et 2 minutes.
# Hors hiver: ouverture à 07:00 avec répétitions après 1 et 2 minutes.
# Cibles: bureau, chambre ami, salle a manger (porte_patio), salon.
- id: 'open_covers_winter_sun_else_7am'
  alias: Store | Ouverture saisonniere bureau Luc, chambre ami, salle a manger, salon
  description: En hiver ouvre au lever du soleil, sinon ouvre à 07:00. 4 essais espacés de 1 minute, y compris le salon a +15 min.
  triggers:
  - trigger: sun
    event: sunrise
    id: sunrise
  - trigger: time
    at: '07:00:00'
    id: time_0
  conditions:
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: trigger
        id: sunrise
      - condition: template
        value_template: "{{ now().month in [11, 12, 1, 2] }}"
    - condition: and
      conditions:
      - condition: trigger
        id: time_0
      - condition: template
        value_template: "{{ now().month not in [11, 12, 1, 2] }}"
  actions:
  - repeat:
      count: 4
      sequence:
      - action: cover.open_cover
        target:
          entity_id:
          - cover.bureau
          - cover.chambre_amis
          - cover.porte_patio
      - if: "{{ not repeat.last }}"
        then:
        - delay: '00:01:00'
  - delay: '00:15:00'
  - repeat:
      count: 4
      sequence:
      - action: cover.open_cover
        target:
          entity_id: cover.salon
      - if: "{{ not repeat.last }}"
        then:
        - delay: '00:01:00'
  mode: single

# ============================================================
# [FERMETURE BUREAU LUC ET CHAMBRE AMI AU COUCHER DU SOLEIL AVEC REPETITIONS]
# ============================================================
# Ferme les stores du bureau Luc et de la chambre ami au coucher du soleil, puis répète après 1 et 2 minutes.
- id: 'sunset_close_bureau_luc_with_repeats'
  alias: Store | Bureau Luc et Chambre Ami | Fermer stores au coucher du soleil avec répétitions
  description: Ferme les stores du bureau Luc et de la chambre ami au coucher du soleil, puis répète après 1 et 2 minutes.
  triggers:
  - trigger: sun
    event: sunset
  conditions: []
  actions:
    - repeat:
        count: 4
        sequence:
        - action: cover.close_cover
          target:
            entity_id:
            - cover.bureau
            - cover.chambre_amis
        - if: "{{ not repeat.last }}"
          then:
          - delay: '00:00:30'
  mode: single
# ============================================================
# [FERMETURE CHAMBRE MAITRE AVANT SOLEIL]
# ============================================================
# Ferme le store de la chambre maitre 45 minutes avant le coucher du soleil.
# Cette automatisation est independante de andre_mode.
- id: 'close_master_bedroom_cover_45min_before_sunset'
  alias: Store | Soleil | Fermer store chambre maitre 45 min avant coucher (4 fois)
  description: Ferme le store de la chambre maitre 45 minutes avant le coucher du soleil et répète 4 fois.
  triggers:
    - trigger: sun
      event: sunset
      offset: '-00:45:00'
  conditions: []
  actions:
    - repeat:
        count: 4
        sequence:
          - action: cover.close_cover
            target:
              entity_id: cover.chambre_maitre
          - delay: '00:01:00' # Attend 1 minute entre chaque répétition
  mode: single
# ============================================================
# [OUVERTURE CHAMBRE MAITRE AVANT SOLEIL]
# ============================================================
# Ferme le store de la chambre maitre 45 minutes avant le coucher du soleil.
# Cette automatisation est independante de andre_mode.
- id: 'open_master_bedroom_cover_0800'
  alias: Store | Chambre Maître | Ouvrir store à 08h00 (4 fois)
  description: Ouvre le store de la chambre maître à 8h00 du matin et répète 4 fois.
  triggers:
    - trigger: time
      at: '08:00:00'
  conditions: []
  actions:
    - repeat:
        count: 4
        sequence:
          - action: cover.open_cover
            target:
              entity_id: cover.chambre_maitre
          - delay: '00:01:00' # Attend 1 minute entre chaque répétition
  mode: single

# ============================================================
# [BUREAU LUC - FERMETURE SI ENSOLEILLE]
# ============================================================
# Jours de semaine a 13:30, si la meteo est "sunny",
# le store du bureau Luc se ferme a 75%.
# Entite meteo detectee: weather.forecast_maison
- id: 'bureau_luc_weekday_1330_if_sunny_close_75'
  alias: Store | Bureau Luc | 13:30 semaine si soleil fermer a 75% (4 fois)
  description: En semaine a 13:30, ferme le store bureau a 75% si meteo ensoleillee et répète 4 fois.
  triggers:
    - trigger: time
      at: '13:15:00'
  conditions:
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    - condition: state
      entity_id: weather.forecast_maison
      state: sunny
  actions:
    - repeat:
        count: 4
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: cover.bureau
            data:
              position: 75
          - delay: '00:00:15' # Attend 1 minute avant la prochaine répétition
  mode: single


# ============================================================
# [SERRURE ENTREE - REBARRER AUTO]
# ============================================================
# Si la serrure d'entree reste debarree pendant 15 minutes,
# elle est rebarree automatiquement.
- id: 'entry_lock_auto_relock_after_5min'
  alias: "Serrure | Entree | Rebarre serrure apres 15 min debarree"
  trigger:
    - trigger: state
      entity_id: lock.porte
      to: unlocked
      for: '00:15:00'
  action:
    - action: script.lock_porte_securise
  mode: single

# ============================================================
# [MODE TV SALON]
# ============================================================
# Quand Google TV (salon) s'allume apres 19:30, on desactive le capteur motion
# de l'entree, on eteint entree/salle a manger/foyer, on tamise le salon plafond
# et on lance la scene Rest pour la cuisine.
# Quand la TV s'eteint apres 21:00, on reactive le motion d'entree
# et on ferme les lumieres de la zone salon.

- id: 'living_room_google_tv_mode'
  alias: TV | Salon | Mode TV Google
  description: Actions au demarrage et a l'arret de la TV du salon avec capteur de seuil.
  triggers:
    - trigger: state
      entity_id: remote.tv
      from: 'off'
      to: 'on'
      id: tv_on
    - trigger: state
      entity_id: remote.tv
      to: 'off'
      id: tv_off
    - trigger: time
      at: '22:00:00'
      id: restore_motion_22h
  conditions: []
  actions:
    - choose:
      - conditions:
          - condition: trigger
            id: tv_on
          - condition: time
            after: '18:30:00'
            before: '20:55:00'
          - condition: state
            entity_id: input_boolean.andre_mode
            state: 'off'
          - condition: state
            entity_id: input_boolean.guest_mode
            state: 'off'
        sequence:
          - variables:
              salon_brightness_pct: >-
                {% set salon_lights = expand(area_entities('salon'))
                  | selectattr('domain', 'eq', 'light')
                  | selectattr('state', 'eq', 'on')
                  | list %}
                {% set salon_brightness = salon_lights
                  | map(attribute='attributes.brightness')
                  | reject('equalto', none)
                  | list %}
                {% if salon_brightness | count > 0 %}
                  {{ ((salon_brightness | sum / (salon_brightness | count)) / 255 * 100) | round(0) }}
                {% else %}
                  30
                {% endif %}
              foyer_brightness_pct: >-
                {% set foyer_lights = expand(area_entities('foyer'))
                  | selectattr('domain', 'eq', 'light')
                  | selectattr('state', 'eq', 'on')
                  | list %}
                {% set foyer_brightness = foyer_lights
                  | map(attribute='attributes.brightness')
                  | reject('equalto', none)
                  | list %}
                {% if foyer_brightness | count > 0 %}
                  {{ ((foyer_brightness | sum / (foyer_brightness | count)) / 255 * 100) | round(0) }}
                {% else %}
                  30
                {% endif %}
          - action: scene.turn_on
            target:
              entity_id: scene.foyer_rest
          - action: light.turn_on
            target:
              area_id: foyer
            data:
              brightness_pct: "{{ foyer_brightness_pct | int }}"
          - action: scene.turn_on
            target:
              entity_id: scene.salon_detente
          - action: light.turn_on
            target:
              area_id: salon
            data:
              brightness_pct: "{{ salon_brightness_pct | int }}"
          - parallel:
              - action: light.turn_off
                target:
                  area_id: foyer
                data:
                  transition: 20
              - action: light.turn_off
                target:
                  entity_id:
                    - light.salon_1
                    - light.salon_4
                data:
                  transition: 20
              - action: light.turn_on
                target:
                  entity_id:
                    - light.salon_2
                    - light.salon_3
                data:
                  brightness_pct: 30
                  transition: 20
          - action: scene.turn_on
            target:
              entity_id: scene.cuisine_rest
          - action: tts.speak
            target:
              entity_id: tts.google_translate_fr_ca
            data:
              media_player_entity_id: media_player.mini
              message: 'Bonne soirée télé'
      - conditions:
          - condition: trigger
            id: tv_off
          - condition: time
            after: '21:00:00'
            before: '23:55:00'
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.motion_entre_capteur_de_mouvement
          - action: light.turn_off
            target:
              area_id: salon
          - delay: '00:01:00'
          - action: media_player.turn_off
            target:
              entity_id: media_player.tele_qn50ls03aafxzc
      - conditions:
          - condition: trigger
            id: restore_motion_22h
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.motion_entre_capteur_de_mouvement
  mode: restart

