# ============================================================
# [SALLE A MANGER - ATTENUATION PROGRESSIVE 19H]
# ============================================================
# A 19:00, les lumieres de salle a manger passent progressivement
# en mode attenue sur 30 minutes si andre_mode OU guest_mode est OFF.
- id: 'rezchausse_progressive_dim_if_mode_off'
  alias: Lumiere | DIM Sallon, foyer, Salle a manger et cuisine | Passage progressif soir
  description: De novembre a avril, attenue a 19:30. De mai a octobre, attenue 1h apres le coucher du soleil, si andre_mode ou guest_mode est OFF.
  triggers:
  - trigger: time
    at: '19:30:00'
    id: nov_apr_1930
  - trigger: sun
    event: sunset
    offset: '01:00:00'
    id: may_oct_sunset_plus_1h
  conditions:
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: trigger
        id: nov_apr_1930
      - condition: template
        value_template: "{{ now().month in [11, 12, 1, 2, 3, 4] }}"
    - condition: and
      conditions:
      - condition: trigger
        id: may_oct_sunset_plus_1h
      - condition: template
        value_template: "{{ now().month in [5, 6, 7, 8, 9, 10] }}"
  - condition: or
    conditions:
    - condition: state
      entity_id: input_boolean.andre_mode
      state: 'off'
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'off'
  - condition: state
    entity_id: remote.tv
    state: 'off'
  actions:
  - action: scene.turn_on
    target:
      entity_id: scene.salon_detente
  - action: scene.turn_on
    target:
      entity_id:
      - scene.foyer_rest
      - scene.salle_a_manger_rest
  - action: scene.turn_on
    target:
      entity_id: scene.cuisine_detente
  mode: single

# ============================================================
# [LUMIERE - ON SALON, FOYER, SALLE A MANGER ET CUISINE]
# ============================================================
# Allume les lumieres 45 minutes avant le coucher du soleil
# en utilisant le scenario concentration a 100%.
- id: 'lights_on_salon_foyer_dining_kitchen_45min_before_sunset'
  alias: Lumiere | ON Salon, Foyer, Salle a manger et cuisine
  description: Active le scenario concentration a 100% 45 minutes avant le coucher du soleil.
  triggers:
  - trigger: sun
    event: sunset
    offset: '-00:45:00'
  conditions: []
  actions:
  - action: scene.turn_on
    target:
      entity_id:
      - scene.salon_concentration
      - scene.foyer_concentration
      - scene.salle_a_manger_concentration
      - scene.cuisine_concentration
  mode: single

# ============================================================
# [NUIT - ETEINDRE TOUTES LES LUMIERES SAUF ADRESSE]
# ============================================================
# Entre 22:30 et 23:30 (heure aleatoire), eteint toutes les lumieres allumees sauf celles de la zone Adresse.
- id: 'night_random_turn_off_lights_except_adresse'
  alias: Lumiere | Nuit | Eteindre toutes les lumieres sauf Adresse
  description: Entre 22:30 et 23:30 (aleatoire), eteint toutes les lumieres allumees sauf la zone Adresse.
  triggers:
  - trigger: time
    at: '22:30:00'
  conditions: []
  actions:
  - delay:
      seconds: "{{ range(0, 3601) | random }}"
  - action: script.night_shutdown_except_adresse
  mode: single

# ============================================================
# [HUE - Matin simulation aube cote Luc]
# ============================================================
# A 06:30, la simulation aube commence.  
- id: 'matin_reveille_aube_cote_luc'
  alias: "Lumiere | Réveil : Aube Matinale - Chambre"
  description: "Simulation aube douce Hue: 06:30 ambre faible, 07:00 plus clair, 07:30 extinction (semaine, hors vacances)."
  triggers:
  - trigger: time
    at: '06:30:00'
    id: dawn_warm_low
  - trigger: time
    at: '07:00:00'
    id: dawn_warm_mid
  - trigger: time
    at: '07:30:00'
    id: off_730
  conditions:
  - condition: state
    entity_id: input_boolean.vacances
    state: 'off'
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: dawn_warm_low
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.cote_luc
        data:
          brightness_pct: 18
          color_temp_kelvin: 2000
          transition: 900
    - conditions:
      - condition: trigger
        id: dawn_warm_mid
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.cote_luc
        data:
          brightness_pct: 45
          color_temp_kelvin: 2700
          transition: 1800
    - conditions:
      - condition: trigger
        id: off_730
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.cote_luc
        data:
          transition: 20
  mode: restart

# ============================================================
# [CUISINE - ARMOIRE MATIN SAISONNIER]
# ============================================================
# De novembre a avril, active la scene Cuisine Nouveau scenario
# a 06:35 les jours de semaine et a 07:00 la fin de semaine,
# puis eteint la lumiere Armoire a 08:00.
- id: 'kitchen_armoire_morning_nov_to_apr'
  alias: Lumiere | Cuisine | Armoire matin saisonnier
  description: Active la scene Cuisine Nouveau scenario le matin de novembre a avril, puis eteint Armoire a 08:00.
  triggers:
  - trigger: time
    at: '06:35:00'
    id: weekday_on
  - trigger: time
    at: '07:00:00'
    id: weekend_on
  - trigger: time
    at: '08:00:00'
    id: turn_off
  conditions:
  - condition: template
    value_template: "{{ now().month in [11, 12, 1, 2, 3, 4] }}"
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: weekday_on
      - condition: time
        weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.cuisine_nouveau_scenario
    - conditions:
      - condition: trigger
        id: weekend_on
      - condition: time
        weekday:
        - sat
        - sun
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.cuisine_nouveau_scenario
    - conditions:
      - condition: trigger
        id: turn_off
      sequence:
      - action: light.turn_off
        target:
