title: Cellulaire
views:
  - title: Cellulaire | Maison
    path: mobile
    icon: mdi:cellphone
    cards:
      # Titre dynamique avec heure et profil maison
      - type: custom:mushroom-title-card
        title: >-
          {% set h = now().hour %}
          {% if h < 12 %}Bonjour 👋
          {% elif h < 18 %}Bon après-midi 👋
          {% else %}Bonsoir 👋{% endif %}
        subtitle: >-
          {{ state_attr('weather.forecast_maison', 'temperature') }}°C —
          {{ states('input_select.house_profile') }}

      # Chips : modes actifs visibles d'un coup d'œil
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            content: Maison
            icon: mdi:home
            icon_color: "{{ 'yellow' if is_state('input_boolean.home_mode', 'on') else 'disabled' }}"
            tap_action:
              action: toggle
              entity: input_boolean.home_mode
          - type: template
            content: Invite
            icon: mdi:account-multiple
            icon_color: "{{ 'yellow' if is_state('input_boolean.guest_mode', 'on') else 'disabled' }}"
            tap_action:
              action: toggle
              entity: input_boolean.guest_mode
          - type: template
            content: Andre
            icon: mdi:account
            icon_color: "{{ 'yellow' if is_state('input_boolean.andre_mode', 'on') else 'disabled' }}"
            tap_action:
              action: toggle
              entity: input_boolean.andre_mode
          - type: template
            content: Vacances
            icon: mdi:palm-tree
            icon_color: "{{ 'yellow' if is_state('input_boolean.vacances', 'on') else 'disabled' }}"
            tap_action:
              action: toggle
              entity: input_boolean.vacances

      # Navigation sous-vues
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Controle rapide
            secondary: Modes, Focus, Soleil…
            icon: mdi:tune
            icon_color: green
            tap_action:
              action: navigate
              navigation_path: /cellulaire/controle-rapide
          - type: custom:mushroom-template-card
            primary: Actions rapides
            secondary: Bonne nuit, stores, porte…
            icon: mdi:lightning-bolt
            icon_color: orange
            tap_action:
              action: navigate
              navigation_path: /cellulaire/actions-rapides

      # Grille pièces — 2 colonnes pour mobile
      - type: grid
        title: Pièces
        columns: 2
        square: false
        cards:
          - type: area
            area: salon
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-salon"
          - type: area
            area: foyer
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-foyer"
          - type: area
            area: salle_a_manger
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-salle_a_manger"
          - type: area
            area: cuisine
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-cuisine"
          - type: area
            area: entree
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-entree"
          - type: area
            area: chambre
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-chambre"
          - type: area
            area: poulailler
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-poulailler"

      # Éclairage — ajout salon et foyer
      - type: grid
        title: Eclairage
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.salon
            name: Salon
            show_brightness_control: true
            collapsible_controls: true
          - type: custom:mushroom-light-card
            entity: light.foyer
            name: Foyer
            show_brightness_control: true
            collapsible_controls: true
          - type: custom:mushroom-light-card
            entity: light.salle_a_manger
            name: Salle a manger
            show_brightness_control: true
            collapsible_controls: true
          - type: custom:mushroom-light-card
            entity: light.armoire
            name: Armoire cuisine
            show_brightness_control: true
            collapsible_controls: true
          - type: custom:mushroom-light-card
            entity: light.entree_2
            name: Entree
            show_brightness_control: true
            collapsible_controls: true
          - type: custom:mushroom-light-card
            entity: light.cote_luc
            name: Cote Luc
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true
          - type: custom:mushroom-template-card
            primary: Poulailler
            secondary: "{{ 'Allumé' if is_state('light.poulailler', 'on') else 'Éteint' }}"
            icon: mdi:egg
            icon_color: "{{ 'yellow' if is_state('light.poulailler', 'on') else 'disabled' }}"
            entity: light.poulailler
            tap_action:
              action: call-service
              service: script.toggle_poules

      # Stores — accès direct sans grid wrapper inutile
      - type: custom:mushroom-template-card
        primary: Stores
        secondary: Accès à tous les stores de la maison
        icon: mdi:blinds
        icon_color: cyan
        tap_action:
          action: navigate
          navigation_path: /cellulaire/stores

      # TV Salon
      - type: custom:mushroom-media-player-card
        entity: media_player.tele_qn50ls03aafxzc
        name: TV Salon
        use_media_info: true
        show_volume_level: true
        volume_controls:
          - volume_mute
          - volume_set

      # Statuts maison — style Mushroom cohérent
      - type: custom:mushroom-title-card
        title: Statuts maison

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: lock.porte
            name: Serrure
            icon: mdi:lock
          - type: custom:mushroom-entity-card
            entity: binary_sensor.porte_porte
            name: Porte entrée
            icon: mdi:door
          - type: custom:mushroom-entity-card
            entity: sensor.porte_temps_deverrouillee
            name: Temps déverrouillée
            icon: mdi:timer-outline
          - type: custom:mushroom-entity-card
            entity: weather.forecast_maison
            name: Météo
            icon: mdi:weather-partly-cloudy
          - type: custom:mushroom-entity-card
            entity: input_select.house_profile
            name: Profil maison
            icon: mdi:home-circle

  - title: Controle rapide
    path: controle-rapide
    icon: mdi:tune
    subview: true
    cards:
      - type: custom:mushroom-title-card
        title: Controle rapide
        subtitle: Modes et minuteries

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Maison
            secondary: "{{ 'Activé' if is_state('input_boolean.home_mode', 'on') else 'Désactivé' }}"
            icon: mdi:home
            icon_color: "{{ 'yellow' if is_state('input_boolean.home_mode', 'on') else 'disabled' }}"
            entity: input_boolean.home_mode
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: Invite
            secondary: "{{ 'Activé' if is_state('input_boolean.guest_mode', 'on') else 'Désactivé' }}"
            icon: mdi:account-multiple
            icon_color: "{{ 'yellow' if is_state('input_boolean.guest_mode', 'on') else 'disabled' }}"
            entity: input_boolean.guest_mode
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: Andre
            secondary: "{{ 'Activé' if is_state('input_boolean.andre_mode', 'on') else 'Désactivé' }}"
            icon: mdi:account
            icon_color: "{{ 'yellow' if is_state('input_boolean.andre_mode', 'on') else 'disabled' }}"
            entity: input_boolean.andre_mode
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: Vacances
            secondary: "{{ 'Activé' if is_state('input_boolean.vacances', 'on') else 'Désactivé' }}"
            icon: mdi:palm-tree
            icon_color: "{{ 'yellow' if is_state('input_boolean.vacances', 'on') else 'disabled' }}"
            entity: input_boolean.vacances
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: Focus
            secondary: "{{ 'Actif' if is_state('timer.focus_session', 'active') else 'Inactif' }}"
            icon: mdi:timer
            icon_color: "{{ 'yellow' if is_state('timer.focus_session', 'active') else 'disabled' }}"
            entity: timer.focus_session
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: Prochain lever
            secondary: >-
              {{ as_local(state_attr('sun.sun', 'next_rising')).strftime('%H:%M')
              if state_attr('sun.sun', 'next_rising') else 'Indisponible' }}
            icon: mdi:weather-sunset-up
            icon_color: amber
            entity: sun.sun
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: Prochain coucher
            secondary: >-
              {{ as_local(state_attr('sun.sun', 'next_setting')).strftime('%H:%M')
              if state_attr('sun.sun', 'next_setting') else 'Indisponible' }}
            icon: mdi:weather-sunset-down
            icon_color: orange
            entity: sun.sun
            tap_action:
              action: more-info

  - title: Actions rapides
    path: actions-rapides
    icon: mdi:lightning-bolt
    subview: true
    cards:
      - type: custom:mushroom-title-card
        title: Actions rapides
        subtitle: Confirmez votre action

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Bonne nuit
            secondary: Extinction + verrouillage
            icon: mdi:weather-night
            icon_color: deep-purple
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.night_shutdown_except_adresse
          - type: custom:mushroom-template-card
            primary: Verrouiller porte
            secondary: Script sécurisé
            icon: mdi:lock
            icon_color: indigo
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.lock_porte_securise
          - type: custom:mushroom-template-card
            primary: Fermer stores RdC
            secondary: Salon + porte patio
            icon: mdi:blinds
            icon_color: blue-grey
            tap_action:
              action: call-service
              service: cover.close_cover
              target:
                entity_id:
                  - cover.salon
                  - cover.porte_patio
          - type: custom:mushroom-template-card
            primary: Ouvrir stores RdC
            secondary: Salon + porte patio
            icon: mdi:blinds-open
            icon_color: cyan
            tap_action:
              action: call-service
              service: cover.open_cover
              target:
                entity_id:
                  - cover.salon
                  - cover.porte_patio
          - type: custom:mushroom-template-card
            primary: Éteindre salon
            secondary: Toutes les lumières salon
            icon: mdi:lightbulb-off
            icon_color: grey
            tap_action:
              action: call-service
              service: light.turn_off
              target:
                area_id: salon
          - type: custom:mushroom-template-card
            primary: TV — Éteindre
            secondary: Samsung The Frame
            icon: mdi:television-off
            icon_color: red
            tap_action:
              action: call-service
              service: media_player.turn_off
              target:
                entity_id: media_player.tele_qn50ls03aafxzc

  - title: Stores
    path: stores
    icon: mdi:blinds
    subview: true
    cards:
      - type: custom:mushroom-title-card
        title: Stores
        subtitle: Tous les stores de la maison

      - type: grid
        title: Tous les stores
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-cover-card
            entity: cover.salon
            name: Salon
            show_position_control: true
          - type: custom:mushroom-cover-card
            entity: cover.porte_patio
            name: Porte patio
            show_position_control: true
          - type: custom:mushroom-cover-card
            entity: cover.bureau
            name: Bureau
            show_position_control: true
          - type: custom:mushroom-cover-card
            entity: cover.chambre_maitre
            name: Chambre maitre
            show_position_control: true
          - type: custom:mushroom-cover-card
            entity: cover.chambre_amis
            name: Chambre amis
            show_position_control: true
          - type: custom:mushroom-entity-card
            entity: binary_sensor.third_reality_inc_3rds17bz
            name: Capteur store chambre amie
          - type: custom:mushroom-entity-card
            entity: sensor.third_reality_inc_3rds17bz_batterie
            name: Batterie capteur store chambre amie
