title: Pixel 9a
views:
  - title: Mobile
    path: mobile
    icon: mdi:cellphone
    cards:
      - type: custom:mushroom-title-card
        title: Maison
        subtitle: Controle rapide Pixel 9a

      - type: grid
        title: Controle rapide Pixel 9a
        columns: 4
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Maison
            icon: mdi:home
            icon_color: "{{ 'yellow' if is_state('input_boolean.home_mode', 'on') else 'disabled' }}"
            entity: input_boolean.home_mode
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: Invite
            icon: mdi:account-multiple
            icon_color: "{{ 'yellow' if is_state('input_boolean.guest_mode', 'on') else 'disabled' }}"
            entity: input_boolean.guest_mode
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: Andre
            icon: mdi:account
            icon_color: "{{ 'yellow' if is_state('input_boolean.andre_mode', 'on') else 'disabled' }}"
            entity: input_boolean.andre_mode
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: Focus
            icon: mdi:timer
            icon_color: "{{ 'yellow' if is_state('timer.focus_session', 'active') else 'disabled' }}"
            entity: timer.focus_session
            tap_action:
              action: toggle

      - type: grid
        title: Actions rapides
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Home ON
            secondary: Active le mode maison
            icon: mdi:home
            icon_color: green
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.set_home_mode_on
          - type: custom:mushroom-template-card
            primary: Home OFF
            secondary: Coupe le mode maison
            icon: mdi:home-off
            icon_color: red
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.set_home_mode_off
          - type: custom:mushroom-template-card
            primary: Bonne nuit
            secondary: Lance la sequence de nuit
            icon: mdi:weather-night
            icon_color: deep-purple
            tap_action:
              action: call-service
              service: automation.trigger
              target:
                entity_id: automation.nuit_eteindre_toutes_les_lumieres_sauf_adresse
          - type: custom:mushroom-template-card
            primary: Verrouiller porte
            secondary: Script securise
            icon: mdi:lock
            icon_color: indigo
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.lock_porte_securise

      - type: grid
        title: Pièces
        columns: 3
        square: false
        cards:
          - type: area
            area: salon
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-salon"
          - type: area
            area: foyer
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-foyer"
          - type: area
            area: salle_a_manger
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-salle_a_manger"
          - type: area
            area: cuisine
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-cuisine"
          - type: area
            area: entree
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-entree"
          - type: area
            area: chambre
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-chambre"
          - type: area
            area: poulailler
            alert_classes:
              - motion
              - moisture
            sensor_classes:
              - temperature
              - humidity
            display_type: picture
            features_position: bottom
            vertical: false
            tap_action:
              action: navigate
              navigation_path: "/home/areas-poulailler"

      - type: grid
        title: Eclairage
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.salle_a_manger
            name: Salle a manger
            show_brightness_control: true
            collapsible_controls: true
          - type: custom:mushroom-light-card
            entity: light.entree_2
            name: Entree
            show_brightness_control: true
            collapsible_controls: true
          - type: custom:mushroom-light-card
            entity: light.cote_luc
            name: Cote Luc
            show_brightness_control: true
            show_color_temp_control: true
            collapsible_controls: true
          - type: custom:mushroom-light-card
            entity: light.armoire
            name: Armoire
            show_brightness_control: true
            collapsible_controls: true

      - type: grid
        title: Stores
        columns: 1
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Regroupes Stores
            secondary: Accès à tous les stores de la maison
            icon: mdi:blinds
            icon_color: cyan
            tap_action:
              action: navigate
              navigation_path: /pixel-9a/stores

      - type: custom:mushroom-media-player-card
        entity: media_player.tele_qn50ls03aafxzc
        name: TV Salon
        use_media_info: true
        show_volume_level: true
        volume_controls:
          - volume_mute
          - volume_set

      - type: entities
        title: Statuts maison
        show_header_toggle: false
        entities:
          - entity: lock.porte
          - entity: weather.forecast_maison
          - entity: input_select.house_profile

  - title: Stores
    path: stores
    icon: mdi:blinds
    subview: true
    cards:
      - type: custom:mushroom-title-card
        title: Stores
        subtitle: Tous les stores de la maison

      - type: grid
        title: Tous les stores
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-cover-card
            entity: cover.salon
            name: Salon
            show_position_control: true
          - type: custom:mushroom-cover-card
            entity: cover.porte_patio
            name: Porte patio
            show_position_control: true
          - type: custom:mushroom-cover-card
            entity: cover.bureau
            name: Bureau
            show_position_control: true
          - type: custom:mushroom-cover-card
            entity: cover.chambre_maitre
            name: Chambre maitre
            show_position_control: true
          - type: custom:mushroom-cover-card
            entity: cover.chambre_amis
            name: Chambre amis
            show_position_control: true
