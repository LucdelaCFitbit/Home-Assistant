      - type: custom:mushroom-title-card

      - type: custom:mushroom-template-card
        primary: Controle rapide
        secondary: Modes maison, invite, Andre, Focus…
        icon: mdi:tune
        icon_color: green
        tap_action:
          action: navigate
          navigation_path: /pixel-9a/controle-rapide

      - type: custom:mushroom-template-card
        primary: Actions rapides
        secondary: Bonne nuit, verrouiller porte…
        icon: mdi:lightning-bolt
        icon_color: orange
        tap_action:
          action: navigate
          navigation_path: /pixel-9a/actions-rapides

