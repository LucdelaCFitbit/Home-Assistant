#   - action: script.reload
lock_porte_securise:
  alias: "Verrouillage Sécurisé Porte Entrée"
  description: "Tente de verrouiller si la serrure est debarree, meme si le capteur porte est indisponible ou bloque"
  sequence:
    - condition: state
      entity_id: lock.porte
      state: "unlocked"
    - action: lock.lock
      target:
        entity_id: lock.porte
  mode: single
toggle_poules:
  alias: Toggle Lumière Poulailler
  description: Allume avec le scénario Concentration 100% ou éteint la lumière du Poulailler
  sequence:
    - choose:
        - conditions:
            - condition: state
              entity_id: light.poulailler
              state: "on"
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.poulailler
      default:
        - action: scene.turn_on
          target:
            entity_id: scene.poulailler_concentration
  mode: single
turn_off_all_lights_except_adresse:
  alias: Lumiere | Eteindre toutes les lumieres sauf Adresse
  description: Eteint toutes les lumieres allumees sauf celles de la zone Adresse.
  sequence:
  - variables:
      lights_to_turn_off: >-
        {{
          states.light
          | selectattr('state', 'eq', 'on')
          | map(attribute='entity_id')
          | reject('in', area_entities('adresse'))
          | list
        }}
  - condition: template
    value_template: "{{ lights_to_turn_off | count > 0 }}"
  - action: light.turn_off
    target:
      entity_id: "{{ lights_to_turn_off }}"
  mode: single
night_shutdown_except_adresse:
  alias: Nuit | Extinction sauf Adresse
  description: Verrouille la porte, eteint toutes les lumieres sauf Adresse et coupe la TV si necessaire.
  sequence:
  - action: script.lock_porte_securise
  - action: script.turn_off_all_lights_except_adresse
  - action: media_player.turn_off
    target:
      entity_id: media_player.tele_qn50ls03aafxzc
  mode: single
verifier_et_actionner_store:
  alias: "Vérification dynamique store avec répétition"
  mode: parallel
  fields:
    store_entity:
      description: "L'entité du store (ex: cover.chambre_ami)"
    sensor_entity:
      description: "Le capteur (ex: binary_sensor.capteur_store_chambre_amie)"
    action_type:
      description: "close ou open"
    delay_seconds:
      description: "Délai entre chaque tentative"
    nombre_essais:
      description: "Nombre maximum de tentatives avant notification"
      example: 3

  sequence:
    - repeat:
        count: "{{ nombre_essais | int }}"
        sequence:
          # 1. Envoyer la commande
          - service: "cover.{{ action_type }}_cover"
            target:
              entity_id: "{{ store_entity }}"
          
          # 2. Attendre le délai
          - delay: "{{ delay_seconds | int }}"
          
          # 3. Vérifier si c'est réussi pour arrêter la boucle plus tôt
          - if:
              - condition: template
                value_template: >
                  {% if action_type == 'close' %}
                    {{ is_state(sensor_entity, 'off') }}
                  {% else %}
                    {{ is_state(sensor_entity, 'on') }}
                  {% endif %}
            then:
              # --- ACTION SI RÉUSSITE ---
              # On peut envoyer une notification de succès ici
              - service: system_log.write
                data:
                  level: info
                  message: "Succès pour {{ store_entity }} après {{ repeat.index }} essai(s)."
              
              - stop: "Le store est dans la position désirée."

    # 4. Si on arrive ici, c'est que la boucle est finie sans succès
    - service: notify.toutes_les_alertes
      data:
        title: "⚠️ Échec critique Store"
        message: "Le store {{ state_attr(store_entity, 'friendly_name') }} est toujours {{ states(sensor_entity) }} après {{ nombre_essais }} tentatives."
        data:
          priority: high

