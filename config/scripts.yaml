set_home_mode_on:
  alias: Set Home Mode On
  description: Active le mode maison
  sequence:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.home_mode
set_home_mode_off:
  alias: Set Home Mode Off
  description: Desactive le mode maison
  sequence:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.home_mode
reload_yaml_configuration:
  alias: Reload YAML Configuration
  description: Recharge la configuration sans redemarrage complet
  sequence:
  - action: homeassistant.reload_core_config
  - action: automation.reload
  - action: script.reload
lock_porte_securise:
  alias: "Verrouillage Sécurisé Porte Entrée"
  description: "Vérifie l'état de la porte avant de lancer le verrouillage"
  sequence:
    - condition: state
      entity_id: lock.porte
      state: "unlocked"
    - action: lock.lock
      target:
        entity_id: lock.porte
  mode: single
toggle_poules:
  alias: Toggle Lumière Poulailler
  description: Allume avec le scénario Concentration 100% ou éteint la lumière du Poulailler
  sequence:
    - choose:
        - conditions:
            - condition: state
              entity_id: light.poulailler
              state: "on"
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.poulailler
      default:
        - action: scene.turn_on
          target:
            entity_id: scene.poulailler_concentration
  mode: single
turn_off_all_lights_except_adresse:
  alias: Lumiere | Eteindre toutes les lumieres sauf Adresse
  description: Eteint toutes les lumieres allumees sauf celles de la zone Adresse.
  sequence:
  - action: light.turn_off
    target:
      entity_id: >-
        {{
          states.light
          | selectattr('state', 'eq', 'on')
          | map(attribute='entity_id')
          | reject('in', area_entities('adresse'))
          | list
        }}
  mode: single
night_shutdown_except_adresse:
  alias: Nuit | Extinction sauf Adresse
  description: Verrouille la porte, eteint toutes les lumieres sauf Adresse et coupe la TV si necessaire.
  sequence:
  - action: script.lock_porte_securise
  - action: script.turn_off_all_lights_except_adresse
  - action: media_player.turn_off
    target:
      entity_id: media_player.tele_qn50ls03aafxzc
  mode: single
