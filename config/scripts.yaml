set_home_mode_on:
  alias: Set Home Mode On
  description: Active le mode maison
  sequence:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.home_mode
apply_scene_with_current_area_brightness:
  alias: Lumiere | Appliquer scene et conserver brightness zone
  description: Calcule la luminosite moyenne des lumieres allumees d'une zone, applique la scene puis restaure ce brightness.
  fields:
    area_id:
      description: Identifiant de la zone Home Assistant (ex. salon, foyer).
      example: salon
      required: true
    scene_entity:
      description: Entite scene a appliquer.
      example: scene.salon_detente
      required: true
  sequence:
  - variables:
      area_brightness_pct: >-
        {% set area_lights = expand(area_entities(area_id))
          | selectattr('domain', 'eq', 'light')
          | selectattr('state', 'eq', 'on')
          | list %}
        {% set area_brightness = area_lights
          | map(attribute='attributes.brightness')
          | reject('equalto', none)
          | list %}
        {% if area_brightness | count > 0 %}
          {{ ((area_brightness | sum / (area_brightness | count)) / 255 * 100) | round(0) }}
        {% else %}
          30
        {% endif %}
  - action: scene.turn_on
    target:
      entity_id: "{{ scene_entity }}"
  - action: light.turn_on
    target:
      area_id: "{{ area_id }}"
    data:
      brightness_pct: "{{ area_brightness_pct | int }}"
  mode: parallel
