set_home_mode_on:
  alias: Set Home Mode On
  description: Active le mode maison
  sequence:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.home_mode
apply_scene_with_current_area_brightness:
  alias: Lumiere | Appliquer scene et conserver brightness zone
  description: Calcule la luminosite moyenne des lumieres allumees d'une zone, applique la scene puis restaure ce brightness.
  fields:
    area_id:
      description: Identifiant de la zone Home Assistant (ex. salon, foyer).
      example: salon
      required: true
    scene_entity:
      description: Entite scene a appliquer.
      example: scene.salon_detente
      required: true
  sequence:
  - variables:
      area_brightness_pct: >-
        {% set area_lights = expand(area_entities(area_id))
          | selectattr('domain', 'eq', 'light')
          | selectattr('state', 'eq', 'on')
          | list %}
        {% set area_brightness = area_lights
          | map(attribute='attributes.brightness')
          | reject('equalto', none)
          | list %}
        {% if area_brightness | count > 0 %}
          {{ ((area_brightness | sum / (area_brightness | count)) / 255 * 100) | round(0) }}
        {% else %}
          30
        {% endif %}
  - action: scene.turn_on
    target:
      entity_id: "{{ scene_entity }}"
  - action: light.turn_on
    target:
      area_id: "{{ area_id }}"
    data:
      brightness_pct: "{{ area_brightness_pct | int }}"
  mode: parallel
set_home_mode_off:
  alias: Set Home Mode Off
  description: Desactive le mode maison
  sequence:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.home_mode
reload_yaml_configuration:
  alias: Reload YAML Configuration
  description: Recharge la configuration sans redemarrage complet
  sequence:
  - action: homeassistant.reload_core_config
  - action: automation.reload
  - action: script.reload
lock_porte_securise:
  alias: "Verrouillage Sécurisé Porte Entrée"
  description: "Vérifie l'état de la porte avant de lancer le verrouillage"
  sequence:
    - condition: state
      entity_id: lock.porte
      state: "unlocked"
    - action: lock.lock
      target:
        entity_id: lock.porte
  mode: single
toggle_poules:
  alias: Toggle Lumière Poulailler
  description: Allume avec le scénario Concentration 100% ou éteint la lumière du Poulailler
  sequence:
    - choose:
        - conditions:
            - condition: state
              entity_id: light.poulailler
              state: "on"
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.poulailler
      default:
        - action: scene.turn_on
          target:
            entity_id: scene.poulailler_concentration
  mode: single
turn_off_all_lights_except_adresse:
  alias: Lumiere | Eteindre toutes les lumieres sauf Adresse
  description: Eteint toutes les lumieres allumees sauf celles de la zone Adresse.
  sequence:
  - variables:
      lights_to_turn_off: >-
        {{
          states.light
          | selectattr('state', 'eq', 'on')
          | map(attribute='entity_id')
          | reject('in', area_entities('adresse'))
          | list
        }}
  - condition: template
    value_template: "{{ lights_to_turn_off | count > 0 }}"
  - action: light.turn_off
    target:
      entity_id: "{{ lights_to_turn_off }}"
  mode: single
night_shutdown_except_adresse:
  alias: Nuit | Extinction sauf Adresse
  description: Verrouille la porte, eteint toutes les lumieres sauf Adresse et coupe la TV si necessaire.
  sequence:
  - action: script.lock_porte_securise
  - action: script.turn_off_all_lights_except_adresse
  - action: media_player.turn_off
    target:
      entity_id: media_player.tele_qn50ls03aafxzc
  mode: single
