transition_lights_kelvin_then_dim_to_pct:
  alias: Lumiere | Transition Kelvin puis dim a pourcentage
  description: Applique une transition Kelvin aux lumieres compatibles des zones et/ou lumieres ciblees, puis dimme jusqu'au pourcentage cible (global ou par lumiere). Optionnellement, peut ignorer les lumieres deja eteintes.
  fields:
    area_list:
      description: Liste des zones ciblees (ex. salon, foyer).
      example: "salon, foyer"
    light_list:
      description: Liste des lumieres ciblees (ex. light.bureau_luc_1, light.bureau_luc_2).
      example: "light.bureau_luc_1, light.bureau_luc_2"
    color_temp_kelvin:
      description: Temperature Kelvin a atteindre pour les lumieres compatibles.
      example: 2400
      required: true
    kelvin_transition_seconds:
      description: Duree de transition vers la temperature Kelvin (secondes).
      example: 20
      required: true
    end_brightness_pct:
      description: Pourcentage final de luminosite (0-100). 0 signifie extinction complete.
      example: 30
      required: true
    per_light_end_brightness_pct:
      description: Mapping optionnel par lumiere (entity_id -> pourcentage final 0-100), ex. light.bureau_luc_1=20, light.bureau_luc_2=60.
      example: "light.bureau_luc_1: 20, light.bureau_luc_2: 60"
    dim_transition_seconds:
      description: Duree de transition vers le pourcentage final (secondes).
      example: 25
      required: true
    only_if_already_on:
      description: Si true, applique les actions uniquement aux lumieres deja allumees (ne rallume pas les lumieres eteintes).
      example: true
  sequence:
  - variables:
      all_target_lights: >-
        {% set ns = namespace(items=[]) %}
        {% if area_list is defined and area_list is not none %}
          {% set areas = [area_list] if area_list is string else area_list %}
          {% for a in areas %}
            {% set ns.items = ns.items + (area_entities(a) | select('match', '^light\\.') | list) %}
          {% endfor %}
        {% endif %}
        {% if light_list is defined and light_list is not none %}
          {% set lights = [light_list] if light_list is string else light_list %}
          {% for l in lights %}
            {% if l is string and l.startswith('light.') %}
              {% set ns.items = ns.items + [l] %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.items | unique | list }}
      only_if_on_safe: "{{ only_if_already_on | default(false) | bool }}"
      dim_target_lights: >-
        {% if only_if_on_safe | bool %}
          {{ all_target_lights | select('is_state', 'on') | list }}
        {% else %}
          {{ all_target_lights }}
        {% endif %}
      color_temp_lights: >-
        {% set ns = namespace(items=[]) %}
        {% for e in dim_target_lights %}
          {% set modes = state_attr(e, 'supported_color_modes') | default([], true) %}
          {% if 'color_temp' in modes %}
            {% set ns.items = ns.items + [e] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      kelvin_transition_safe: "{{ [0, kelvin_transition_seconds | int(0)] | max }}"
      dim_transition_safe: "{{ [0, dim_transition_seconds | int(0)] | max }}"
      end_pct_safe: >-
        {% set p = end_brightness_pct | int(0) %}
        {{ 0 if p < 0 else (100 if p > 100 else p) }}
  - condition: template
    value_template: "{{ dim_target_lights | count > 0 }}"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ color_temp_lights | count > 0 }}"
      sequence:
      - action: light.turn_on
        target:
          entity_id: "{{ color_temp_lights }}"
        data:
          color_temp_kelvin: "{{ color_temp_kelvin | int(2400) }}"
          transition: "{{ kelvin_transition_safe | int }}"
      - if: "{{ kelvin_transition_safe | int > 0 }}"
        then:
        - delay:
            seconds: "{{ kelvin_transition_safe | int + 2 }}"
  - variables:
      dim_target_lights_now: >-
        {% if only_if_on_safe | bool %}
          {{ all_target_lights | select('is_state', 'on') | list }}
        {% else %}
          {{ dim_target_lights }}
        {% endif %}
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ dim_target_lights_now | count > 0 }}"
      sequence:
      - repeat:
          for_each: "{{ dim_target_lights_now }}"
          sequence:
          - variables:
              target_pct: >-
                {% set fallback = end_pct_safe | int %}
                {% if per_light_end_brightness_pct is defined
                      and per_light_end_brightness_pct is mapping
                      and repeat.item in per_light_end_brightness_pct %}
                  {% set p = per_light_end_brightness_pct[repeat.item] | int(fallback) %}
                {% else %}
                  {% set p = fallback %}
                {% endif %}
                {{ 0 if p < 0 else (100 if p > 100 else p) }}
          - choose:
            - conditions:
              - condition: template
                value_template: "{{ target_pct | int == 0 }}"
              sequence:
              - action: light.turn_off
                target:
                  entity_id: "{{ repeat.item }}"
                data:
                  transition: "{{ dim_transition_safe | int }}"
            default:
            - action: light.turn_on
              target:
                entity_id: "{{ repeat.item }}"
              data:
                brightness_pct: "{{ target_pct | int }}"
                transition: "{{ dim_transition_safe | int }}"
  mode: parallel
