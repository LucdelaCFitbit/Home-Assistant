
# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  packages: !include_dir_named packages

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

wake_on_lan:

template: !include templates.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

lovelace:
  mode: storage
  dashboards:
    pixel-9a:
      mode: yaml
      title: Pixel 9a
      icon: mdi:cellphone
      show_in_sidebar: true
      require_admin: false
      filename: dashboards/pixel9a.yaml
    home-lab:
      mode: yaml
      title: Home Lab
      icon: mdi:home-assistant
      show_in_sidebar: true
      require_admin: false
      filename: dashboards/home.yaml
    system-lab:
      mode: yaml
      title: System
      icon: mdi:server
      show_in_sidebar: true
      require_admin: true
      filename: dashboards/system.yaml
    bureau-luc-nesthub:
      mode: yaml
      title: Bureau Luc Nest Hub
      icon: mdi:monitor-dashboard
      show_in_sidebar: false
      require_admin: false
      filename: dashboards/bureau_luc_nesthub.yaml
notify:
  - name: gmail_alerte
    platform: smtp
    server: "smtp.gmail.com"
    port: 587
    timeout: 15
    sender: "lucdelac@gmail.com"
    encryption: starttls
    username: "lucdelac@gmail.com"
    password: !secret gmail_app_password
    recipient: "lucdelac@gmail.com"
  # Le GROUPE qui combine les deux
  - name: toutes_les_alertes
    platform: group
    services:
      - service: gmail_alerte
      - service: mobile_app_lucdelac